services:
  opsc-postgres:
    image: postgres
    container_name: opsc-handwritten
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: handwritten
    ports:
      - "5432:5432"
    volumes:
      - ./Chinook_Postgresql_schema.sql:/docker-entrypoint-initdb.d/Chinook_Postgresql_schema.sql